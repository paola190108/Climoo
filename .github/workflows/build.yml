name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pyinstaller weather_bot.spec
      - uses: actions/upload-artifact@v4
        with:
          name: WeatherBot-Windows
          path: dist/WeatherBot.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get install -y python3-tk
      - run: pip install -r requirements.txt
      - run: pyinstaller weather_bot.spec
      - uses: actions/upload-artifact@v4
        with:
          name: WeatherBot-Linux
          path: dist/WeatherBot

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            WeatherBot-Windows/WeatherBot.exe
            WeatherBot-Linux/WeatherBot
          body: |
            ##  Climoo — Cutesy Weather Bot

            ### Windows
            Baixe `WeatherBot.exe` e execute. Sem instalação, sem chave API!

            ### Linux
```bash
            chmod +x WeatherBot && ./WeatherBot
```
